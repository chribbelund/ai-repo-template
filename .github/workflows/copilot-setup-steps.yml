name: copilot-setup-steps

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Show tool versions
        run: |
          dotnet --info
          node --version
          npm --version

      - name: Detect project files
        run: |
          echo "Dotnet projects:" 
          find . -name "*.sln" -o -name "*.csproj" | sed 's/^/ - /' || true
          echo "Node manifests:"
          find . -name "package.json" | sed 's/^/ - /' || true

      - name: Restore .NET (if present)
        shell: bash
        run: |
          if find . -name "*.sln" -o -name "*.csproj" | grep -q .; then
            dotnet restore
          else
            echo "No .NET solution/project found, skipping."
          fi

      - name: Scaffold frontend (if not present)
        shell: bash
        run: |
          if [ ! -f package.json ]; then
            npm create vite@latest frontend -- --template react-ts
          else
            echo "package.json already exists, skipping scaffold."
          fi

      - name: Install Node deps (if present)
        shell: bash
        run: |
          if [ -f frontend/package.json ] && [ ! -f package.json ]; then
            cd frontend && npm install
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping."
          fi

      - name: Build .NET (if present)
        shell: bash
        run: |
          if find . -name "*.sln" -o -name "*.csproj" | grep -q .; then
            dotnet build --no-restore
          else
            echo "No .NET solution/project found, skipping."
          fi

      - name: Build frontend (if script exists)
        shell: bash
        run: |
          if [ -f frontend/package.json ] && [ ! -f package.json ]; then
            cd frontend && npm run build
          elif [ -f package.json ] && node -e "const p=require('./package.json'); process.exit(!(p.scripts&&p.scripts.build));"; then
            npm run build
          else
            echo "No frontend build script found, skipping."
          fi
